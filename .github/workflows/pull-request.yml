name: Pull Request Check
on:
  pull_request:
    paths-ignore:
      - "**/*.md"
      - LICENSE
      - "**/*.gitignore"
      - .editorconfig
      - docs/**
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
          check-latest: true
          cache: "pnpm"
      - run: pnpm config set --location=global minimumReleaseAge 0
      - run: pnpm install
      #   run: pnpm run lint
      - run: pnpm run build
      - run: pnpm run test
